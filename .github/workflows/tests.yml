name: OptionsTrackr CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: optionstrackr
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -ptestpassword"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: optionstrackr
      DB_USER: root
      DB_PASSWORD: testpassword

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u root -ptestpassword --silent && break
            echo "Waiting for MySQL... attempt $i"
            sleep 2
          done

      - name: Start Flask app
        run: |
          nohup python run.py > flask.log 2>&1 &
          echo "Waiting for Flask to start..."
          for i in {1..15}; do
            curl -s http://127.0.0.1:5000/health && break
            echo "Attempt $i - Flask not ready yet"
            sleep 2
          done
        env:
          DB_HOST: ${{ env.DB_HOST }}
          DB_PORT: ${{ env.DB_PORT }}
          DB_NAME: ${{ env.DB_NAME }}
          DB_USER: ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}

      - name: Show Flask logs
        if: always()
        run: cat flask.log

      - name: Run Pytest test suite
        run: |
          pytest tests/ -v --tb=short
